name: Revisión diaria MAV

# PRUEBA temporal (14-jun): un horario cercano para validar el cron tras hacer
# el repo público.
#
# Horario de prueba (Colombia = UTC-5):
#   14:55 UTC = 9:55 AM COL
on:
  schedule:
    - cron: "55 14 * * *"
  workflow_dispatch:

jobs:
  picks:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install anthropic

      - name: Generar y enviar picks
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/agente.py
