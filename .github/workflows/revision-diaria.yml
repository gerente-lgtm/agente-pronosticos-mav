name: Revisión diaria MAV

# PRUEBA temporal (14-jun): horarios cercanos para validar que el cron dispara
# tras hacer el repo público. Si funciona, volvemos a los horarios de la mañana.
#
# Horarios de prueba (Colombia = UTC-5):
#   15:00 UTC = 10:00 AM COL
#   16:00 UTC = 11:00 AM COL
#   16:30 UTC = 11:30 AM COL
#   17:00 UTC = 12:00 PM COL
on:
  schedule:
    - cron: "0 15 * * *"
    - cron: "0 16 * * *"
    - cron: "30 16 * * *"
    - cron: "0 17 * * *"
  workflow_dispatch:

jobs:
  picks:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install anthropic

      - name: Generar y enviar picks
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/agente.py
