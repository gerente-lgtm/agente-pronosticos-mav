name: Revisión diaria MAV

# GitHub Actions a veces retrasa o se salta las tareas programadas (cron) en
# cuentas gratuitas. Para darle varias oportunidades, programamos tres corridas
# tempranas. Como el agente solo PREPARA y envía a Telegram (no toca el Forms),
# recibir el informe más de una vez no causa ningún problema.
#
# Horarios (Colombia = UTC-5):
#   11:40 UTC = 6:40 AM COL
#   12:00 UTC = 7:00 AM COL
#   12:20 UTC = 7:20 AM COL
# También se puede disparar a mano desde la pestaña Actions ("Run workflow").
on:
  schedule:
    - cron: "40 11 * * *"
    - cron: "0 12 * * *"
    - cron: "20 12 * * *"
  workflow_dispatch:

jobs:
  picks:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install anthropic

      - name: Generar y enviar picks
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/agente.py
