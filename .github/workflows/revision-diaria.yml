name: Revisión diaria MAV

# Disparo automático: cron nativo de GitHub a las 7:00 AM hora Colombia.
# (Colombia = UTC-5, sin horario de verano → 12:00 UTC.)
#
# Nota: GitHub tarda entre 15 min y ~1 h en "reconocer" un cron recién agregado o
# modificado; NO lo edites a cada rato esperando que dispare ya, porque cada cambio
# reinicia esa espera. Una vez asentado corre confiable en repos PÚBLICOS (como el
# repo tracker-mav, misma cuenta). Para días de partidos muy temprano, puedes
# correrlo a mano con "Run workflow" desde la pestaña Actions.
#
# Se descartó cron-job.org: su plan gratuito no transmite bien el cuerpo POST del
# workflow_dispatch (GitHub respondía 400) y no muestra la respuesta para depurar.
on:
  schedule:
    - cron: "0 12 * * *"    # 7:00 AM COL
  workflow_dispatch:

jobs:
  picks:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install anthropic

      - name: Generar y enviar picks
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/agente.py
