name: Revisión diaria MAV

# El disparo automático lo hace cron-job.org (servicio externo confiable) llamando
# al workflow_dispatch de abajo todos los días a las 7:00 AM hora Colombia. Se quitó
# el "schedule" de GitHub porque en cuentas gratuitas se salta los cron casi siempre
# (verificado 12-14 jun: hacer el repo público NO lo arregló), y tenerlo activo junto
# a cron-job.org enviaría el Telegram dos veces.
#
# Si algún día quieres volver al cron de GitHub, los horarios de producción eran
# (Colombia = UTC-5, sin horario de verano):
#   schedule:
#     - cron: "40 11 * * *"   # 6:40 AM COL
#     - cron: "0 12 * * *"    # 7:00 AM COL
#     - cron: "20 12 * * *"   # 7:20 AM COL
on:
  workflow_dispatch:

jobs:
  picks:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install anthropic

      - name: Generar y enviar picks
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/agente.py
