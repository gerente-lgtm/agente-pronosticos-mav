name: Revisión diaria MAV

# Disparo automático: lo hace el Cloudflare Worker (listener) con un Cron Trigger
# a las 7:00 AM hora Colombia, llamando al workflow_dispatch de abajo. Se quitó el
# cron nativo de GitHub porque en cuentas gratuitas no dispara confiable (verificado
# 14-15 jun: ni siquiera con el repo público). El Worker ya está siempre prendido y
# dispara el workflow con los headers correctos, así que es el disparador más fiable.
# Ver listener/README.md y listener/worker.js (handler "scheduled").
on:
  workflow_dispatch:

jobs:
  picks:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install anthropic

      - name: Generar y enviar picks
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/agente.py
