name: Revisión diaria MAV

# Corre todos los días a las 12:00 UTC = 7:00 AM hora Colombia.
# También se puede disparar a mano desde la pestaña Actions ("Run workflow").
on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  picks:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install anthropic

      - name: Generar y enviar picks
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/agente.py
